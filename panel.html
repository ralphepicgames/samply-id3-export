<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --accent: #C8FF00;
    --bg: #111214;
    --surface: #1a1c1f;
    --surface2: #222427;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #777;
    --success: #4eff91;
    --danger: #ff5c5c;
    --mono: 'JetBrains Mono', 'Fira Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; border-radius: 14px; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100%; }

  /* ── Header ── */
  .hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .hdr-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .close-btn:hover { color: var(--text); }

  /* ── Scrollable body ── */
  .body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .body::-webkit-scrollbar { width: 4px; }
  .body::-webkit-scrollbar-track { background: transparent; }
  .body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Fields ── */
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
  input[type=text], input[type=number] {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-size: 13px; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  input:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ── Art upload ── */
  .art-area {
    border: 1.5px dashed var(--border2); border-radius: 8px; padding: 14px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; color: var(--muted); font-size: 12px;
  }
  .art-area:hover { border-color: var(--accent); background: rgba(200,255,0,0.04); color: var(--text); }
  .art-area.has-art { border-style: solid; }
  .art-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 5px; flex-shrink: 0; display: none; }
  .art-area.has-art .art-thumb { display: block; }
  .art-icon { font-size: 22px; flex-shrink: 0; }
  .art-area.has-art .art-icon { display: none; }
  input[type=file] { display: none; }

  /* ── Track list ── */
  .tracks-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
  .empty-msg { color: var(--muted); font-size: 12px; font-style: italic; }

  .track-list { display: flex; flex-direction: column; gap: 2px; }
  .track {
    display: flex; align-items: center; gap: 9px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; transition: background 0.1s, border-color 0.1s;
  }
  .track.active  { background: rgba(200,255,0,0.05); border-color: rgba(200,255,0,0.2); }
  .track.done    { background: rgba(78,255,145,0.05); border-color: rgba(78,255,145,0.15); }
  .track.error   { background: rgba(255,92,92,0.06); border-color: rgba(255,92,92,0.2); }
  .tn { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 20px; }
  .tname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .tout { font-family: var(--mono); font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; margin-top: 1px; }
  .tst { font-size: 10px; font-weight: 700; min-width: 60px; text-align: right; }
  .tst.waiting     { color: var(--muted); }
  .tst.downloading { color: var(--accent); }
  .tst.tagging     { color: #aac4ff; }
  .tst.done        { color: var(--success); }
  .tst.error       { color: var(--danger); }

  /* ── Progress ── */
  .prog-wrap { background: var(--surface2); border-radius: 3px; height: 3px; overflow: hidden; }
  .prog-bar  { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; width: 0%; }
  .status-line { font-size: 11px; color: var(--muted); min-height: 16px; }

  /* ── Footer ── */
  .footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .btn-run {
    width: 100%; padding: 11px; background: var(--accent); color: #111;
    border: none; border-radius: 7px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-run:disabled { opacity: 0.38; cursor: not-allowed; }
  .btn-run:not(:disabled):hover { opacity: 0.88; }
  .btn-dl {
    width: 100%; padding: 11px; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border2); border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: none; align-items: center; justify-content: center; gap: 7px;
    transition: border-color 0.15s;
  }
  .btn-dl:hover { border-color: var(--accent); color: var(--accent); }
  .btn-dl.visible { display: flex; }
  .log { font-family: var(--mono); font-size: 10px; color: var(--muted); max-height: 60px; overflow-y: auto; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-title">
      <div class="dot"></div>
      Samply ID3 Export
    </div>
    <button class="close-btn" id="closeBtn">×</button>
  </div>

  <div class="body">
    <!-- Metadata fields -->
    <div class="row2">
      <div class="field">
        <label>Artist</label>
        <input type="text" id="artist" placeholder="Artist name">
      </div>
      <div class="field">
        <label>Album</label>
        <input id="album" type="text" placeholder="Album title">
      </div>
    </div>
    <div class="field">
      <label>Year</label>
      <input type="number" id="year" placeholder="2024" min="1900" max="2099" style="width:90px">
    </div>

    <!-- Album art -->
    <div class="field">
      <label>Album art</label>
      <div class="art-area" id="artDrop">
        <img class="art-thumb" id="artThumb" src="" alt="">
        <span class="art-icon">🖼</span>
        <span id="artLabel">Click to upload cover art (JPEG or PNG)</span>
      </div>
      <input type="file" id="artFile" accept="image/jpeg,image/png,image/webp">
    </div>

    <!-- Track list -->
    <div class="tracks-label" id="trackCountLabel">Tracks</div>
    <div id="trackList"><p class="empty-msg">Waiting for Samply to load tracks…</p></div>

    <!-- Progress -->
    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-bar" id="progBar"></div>
    </div>
    <div class="status-line" id="statusLine"></div>
    <div class="log" id="logEl"></div>
  </div>

  <div class="footer">
    <button class="btn-run" id="runBtn">
      ⬇ Download with ID3 tags
    </button>
    <button class="btn-dl" id="dlBtn">
      ✓ Save ZIP
    </button>
  </div>
</div>

<script src="jszip.min.js"></script>
<script src="id3.js"></script>
<script src="panel.js"></script>
</body>
</html>
